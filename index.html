<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakthi Affiliates</title>
  <meta name="description" content="Sakthi Affiliates – Premium curated affiliate deals." />
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dbqd8ehhf/image/upload/q_auto/f_auto/v1781189222/ChatGPT_Image_Jun_11_2026_at_08_16_00_PM_k2scar.png" />
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dbqd8ehhf/image/upload/q_auto/f_auto/v1781189222/ChatGPT_Image_Jun_11_2026_at_08_16_00_PM_k2scar.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo" id="nav-logo-link">
        <div class="logo-icon">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="18" fill="url(#logoGrad)"/>
            <path d="M10 22L14 14L18 20L22 12L26 22" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                <stop stop-color="#a855f7"/>
                <stop offset="1" stop-color="#6366f1"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Sakthi <span class="logo-accent">Affiliates</span></span>
      </a>

      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-links" id="nav-links">
        <li><a href="#home" class="nav-link" id="nav-home">Home</a></li>
        <li><a href="#products" class="nav-link" id="nav-products">Products</a></li>
      </ul>
    </div>
  </nav>

  <!-- ========== HERO / WELCOME SECTION ========== -->
  <section class="hero-section" id="home">
    <div class="hero-container">
      <h1 class="hero-title">Welcome to <span class="brand-name">Sakthi Affiliates</span></h1>
      <p class="hero-subtitle">Your premier destination for handpicked deals and high-quality products. Click any item to shop directly from verified partner stores.</p>
      <div class="hero-buttons">
        <a href="#products" class="btn btn-primary">Explore Products</a>
      </div>
      
      <!-- Associate Partners -->
      <div class="partners-section">
        <span class="partners-title">Associate Partner with</span>
        <div class="partners-grid">
          <div class="partner-card">
            <img src="https://res.cloudinary.com/dbqd8ehhf/image/upload/q_auto/f_auto/v1781270132/amazon_PNG12_ml9ju7.png" alt="Amazon" class="partner-logo amazon-logo">
          </div>
          <div class="partner-card">
            <img src="https://res.cloudinary.com/dbqd8ehhf/image/upload/q_auto/f_auto/v1781270132/Flipkart_logo__2026_kbgjv2.svg" alt="Flipkart" class="partner-logo flipkart-logo">
          </div>
          <div class="partner-card">
            <img src="https://res.cloudinary.com/dbqd8ehhf/image/upload/q_auto/f_auto/v1781270130/10673438_h00fmr.webp" alt="Meesho" class="partner-logo meesho-logo">
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== PRODUCTS ========== -->
  <section class="products-section" id="products">
    <div class="section-container">
      <!-- Product Grid — populated by script.js -->
      <div class="products-grid" id="products-grid"></div>
    </div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2025 Sakthi Affiliates. All rights reserved.</p>
    </div>
  </footer>

  <!-- ========== BACK TO TOP ========== -->
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <script src="script.js"></script>
</body>
</html>
